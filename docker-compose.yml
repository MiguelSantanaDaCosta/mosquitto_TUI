services:
  mosquitto-tui:
    build: .
    container_name: mosquitto_tui
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true

    volumes:
      - /run/systemd:/run/systemd:ro
      - /var/log:/var/log:ro
      - /etc/mosquitto:/etc/mosquitto:ro

    environment:
        - TERM=xterm-256color
